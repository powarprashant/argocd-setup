# ingress-nginx.yaml — Kubernetes Ingress Controller
#
# NGINX Ingress Controller runs as a DaemonSet behind an AWS NLB.
# Chosen over ALB Ingress Controller here because:
#   - Single NLB (cost) vs one ALB per Ingress (cost at scale)
#   - Native WebSocket, gRPC support without annotations
#   - Full NGINX config flexibility (rate limiting, custom headers)
#
# Sync wave -2: installed after cert-manager (needs CRDs for TLS),
# before any application Ingress resources are created.
#
# Architecture:
#   Internet → NLB (TCP 443) → ingress-nginx DaemonSet → Services → Pods
#   cert-manager provisions the TLS cert referenced in each Ingress
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: platform
    layer: infrastructure
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
    notifications.argoproj.io/subscribe.on-sync-failed.slack: platform-critical
    notifications.argoproj.io/subscribe.on-health-degraded.slack: platform-critical
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.10.1
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          # Deploy as DaemonSet for guaranteed capacity on every node
          kind: DaemonSet

          # AWS NLB annotations
          service:
            annotations:
              service.beta.kubernetes.io/aws-load-balancer-type: nlb
              service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
              service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
              service.beta.kubernetes.io/aws-load-balancer-backend-protocol: tcp
              # Preserve real client IP
              service.beta.kubernetes.io/aws-load-balancer-proxy-protocol: "*"
            externalTrafficPolicy: Local    # Preserve client source IP

          # Enable real IP preservation via proxy protocol
          config:
            use-proxy-protocol: "true"
            use-forwarded-headers: "true"
            compute-full-forwarded-for: "true"

            # Security headers
            ssl-protocols: "TLSv1.2 TLSv1.3"
            ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
            hsts: "true"
            hsts-max-age: "31536000"
            hsts-include-subdomains: "true"

            # Performance
            worker-processes: "auto"
            max-worker-connections: "16384"
            keep-alive: "75"
            keep-alive-requests: "100"

            # Rate limiting (global defaults — override per Ingress)
            limit-req-status-code: "429"

          # Metrics for Prometheus
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
              namespace: monitoring

          # Pod Disruption Budget — never take all ingress pods down at once
          podDisruptionBudget:
            enabled: true
            minAvailable: 1

          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi

          # Run on all nodes — tolerate spot instance taints
          tolerations:
            - key: "node.kubernetes.io/unreachable"
              operator: "Exists"
              effect: "NoExecute"
              tolerationSeconds: 10

          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/name
                        operator: In
                        values:
                          - ingress-nginx
                  topologyKey: kubernetes.io/hostname

          # Security context
          podSecurityContext:
            runAsNonRoot: true
            runAsUser: 101

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  ignoreDifferences:
    - group: apps
      kind: DaemonSet
      jsonPointers:
        - /spec/template/spec/containers/0/image   # Auto-updated by node pool upgrades
