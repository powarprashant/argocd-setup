# AppProject: staging
#
# Mirrors production configuration.  Only DevOps team can sync.
# Sync windows enforce a maintenance schedule.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    environment: staging
    managed-by: argocd
spec:
  description: "Staging environment — production-parity, UAT and pre-release validation"

  # ------------------------------------------------------------------ #
  # Permitted source repositories                                       #
  # ------------------------------------------------------------------ #
  sourceRepos:
    - "https://github.com/<YOUR_ORG>/argocd-setup"
    - "https://github.com/<YOUR_ORG>/monitoring-stack"
    - "https://github.com/<YOUR_ORG>/app-*"
    - "https://prometheus-community.github.io/helm-charts"
    - "https://grafana.github.io/helm-charts"

  # ------------------------------------------------------------------ #
  # Permitted destinations                                             #
  # ------------------------------------------------------------------ #
  destinations:
    - server: https://kubernetes.default.svc
      namespace: "staging-*"
    - server: https://kubernetes.default.svc
      namespace: monitoring-staging
    - server: https://kubernetes.default.svc
      namespace: logging-staging

  # ------------------------------------------------------------------ #
  # Cluster-scoped resources                                           #
  # ------------------------------------------------------------------ #
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding

  clusterResourceBlacklist:
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding

  # ------------------------------------------------------------------ #
  # Sync windows — restrict automated syncs to business hours         #
  # Mon-Fri, 08:00-18:00 UTC.  Manual sync always allowed.            #
  # ------------------------------------------------------------------ #
  syncWindows:
    - kind: allow
      schedule: "0 8 * * 1-5"    # Monday-Friday at 08:00 UTC
      duration: 10h               # window closes at 18:00 UTC
      applications:
        - "*"
      manualSync: true
      timeZone: "UTC"
    - kind: deny
      schedule: "0 0 * * 6-0"   # Block automated syncs on weekends
      duration: 48h
      applications:
        - "*"
      manualSync: false           # Do NOT block emergency manual syncs
      timeZone: "UTC"

  # ------------------------------------------------------------------ #
  # RBAC                                                               #
  # ------------------------------------------------------------------ #
  roles:
    - name: staging-admin
      description: Full sync rights for staging
      policies:
        - p, proj:staging:staging-admin, applications, *, staging/*, allow
      groups:
        - <YOUR_ORG>:devops-team

    - name: staging-readonly
      description: Read-only — developers and QA
      policies:
        - p, proj:staging:staging-readonly, applications, get, staging/*, allow
      groups:
        - <YOUR_ORG>:developers
        - <YOUR_ORG>:qa-team
