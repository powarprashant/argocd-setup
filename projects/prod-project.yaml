# AppProject: prod
#
# Production — strictest controls.
# - Only platform-admins group can approve syncs.
# - Automated sync is DISABLED by default (manual promotion required).
# - Sync window: Tuesday-Thursday 10:00-14:00 UTC (Change Freeze outside).
# - No exec/port-forward allowed.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    environment: prod
    managed-by: argocd
spec:
  description: "Production environment — change-controlled, human-gated promotions"

  # ------------------------------------------------------------------ #
  # Permitted source repositories                                       #
  # Only pinned, explicitly named repos — no wildcards in prod.        #
  # ------------------------------------------------------------------ #
  sourceRepos:
    - "https://github.com/<YOUR_ORG>/argocd-setup"
    - "https://github.com/<YOUR_ORG>/monitoring-stack"
    - "https://github.com/<YOUR_ORG>/app-frontend"
    - "https://github.com/<YOUR_ORG>/app-backend"
    - "https://prometheus-community.github.io/helm-charts"
    - "https://grafana.github.io/helm-charts"

  # ------------------------------------------------------------------ #
  # Permitted destinations                                             #
  # ------------------------------------------------------------------ #
  destinations:
    - server: https://kubernetes.default.svc
      namespace: "prod-*"
    - server: https://kubernetes.default.svc
      namespace: monitoring
    - server: https://kubernetes.default.svc
      namespace: logging

  # ------------------------------------------------------------------ #
  # Cluster-scoped resource whitelist (minimal)                        #
  # ------------------------------------------------------------------ #
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace

  # Explicitly deny CRB mutations in prod
  clusterResourceBlacklist:
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole

  # ------------------------------------------------------------------ #
  # Sync windows — Tue/Wed/Thu 10:00-14:00 UTC only                   #
  # ------------------------------------------------------------------ #
  syncWindows:
    - kind: allow
      schedule: "0 10 * * 2-4"   # Tue, Wed, Thu at 10:00 UTC
      duration: 4h
      applications:
        - "*"
      manualSync: true
      timeZone: "UTC"
    - kind: deny
      schedule: "0 0 * * *"      # Deny automated syncs outside the window
      duration: 24h
      applications:
        - "*"
      manualSync: false
      timeZone: "UTC"

  # ------------------------------------------------------------------ #
  # RBAC — strict                                                      #
  # ------------------------------------------------------------------ #
  roles:
    - name: prod-admin
      description: >
        Full sync rights for production.
        Requires both group membership AND manual approval in the ArgoCD UI.
      policies:
        - p, proj:prod:prod-admin, applications, get,    prod/*, allow
        - p, proj:prod:prod-admin, applications, sync,   prod/*, allow
        - p, proj:prod:prod-admin, applications, update, prod/*, allow
        # Explicit deny for destructive operations
        - p, proj:prod:prod-admin, applications, delete, prod/*, deny
        - p, proj:prod:prod-admin, exec,         create, prod/*, deny
      groups:
        - <YOUR_ORG>:platform-admins

    - name: prod-readonly
      description: Auditors, developers — read-only
      policies:
        - p, proj:prod:prod-readonly, applications, get, prod/*, allow
      groups:
        - <YOUR_ORG>:devops-team
        - <YOUR_ORG>:developers
        - <YOUR_ORG>:qa-team
