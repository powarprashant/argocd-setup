# Root Application — the "App of Apps" entry point
#
# This single manifest is the ONLY thing you apply manually.
# It bootstraps ALL other Application CRs (dev-apps, staging-apps,
# prod-apps) and their child applications from Git.
#
# Apply once:
#   kubectl apply -f manifests/bootstrap/root-app.yaml
#
# After that, ArgoCD self-manages everything.
#
# Architecture:
#
#   root-app (this file)
#     ├── dev-apps     (applications/dev/app-of-apps.yaml)
#     │     ├── monitoring-dev
#     │     └── loki-dev
#     ├── staging-apps (applications/staging/app-of-apps.yaml)
#     │     ├── monitoring-staging
#     │     └── loki-staging
#     └── prod-apps    (applications/prod/app-of-apps.yaml)
#           ├── monitoring-prod
#           └── loki-prod
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
  labels:
    app.kubernetes.io/name: root-app
    app.kubernetes.io/part-of: argocd-bootstrap
  annotations:
    notifications.argoproj.io/subscribe.on-sync-failed.slack: platform-critical
    notifications.argoproj.io/subscribe.on-health-degraded.slack: platform-critical
  # IMPORTANT: Do NOT use resources-finalizer on the root app.
  # Deleting the root app would cascade-delete everything.
  # Protect it at the Git + ArgoCD RBAC level instead.
spec:
  # Uses the default project — root app must have the broadest permissions
  project: default

  source:
    repoURL: https://github.com/<YOUR_ORG>/argocd-setup
    targetRevision: main
    # Scan for app-of-apps yamls across all environments
    path: applications
    directory:
      recurse: true       # Recursively find Application CRs in subdirectories
      jsonnet: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
