# ArgoCD Command Parameters ConfigMap
# Fine-tunes server and controller flags without touching the Deployment spec.
# Reference: https://argo-cd.readthedocs.io/en/stable/operator-manual/argocd-cmd-params-cm-yaml/
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    app.kubernetes.io/part-of: argocd
data:
  # ------------------------------------------------------------------ #
  # Server flags                                                        #
  # ------------------------------------------------------------------ #
  # Serve gRPC over the same port as HTTPS (required behind ALB/NLB)
  server.enable.grpc.web: "true"

  # Disable the insecure HTTP port — TLS is terminated at the Ingress/ALB
  server.insecure: "false"

  # ------------------------------------------------------------------ #
  # Application controller                                             #
  # ------------------------------------------------------------------ #
  # Number of concurrent reconciliation workers (scale with cluster size)
  controller.status.processors: "20"
  controller.operation.processors: "10"

  # Repo server parallelism
  reposerver.parallelism.limit: "10"

  # ------------------------------------------------------------------ #
  # Metrics                                                            #
  # ------------------------------------------------------------------ #
  # Expose Prometheus metrics on the default port (9090 on each component)
  server.metrics.port: "8083"
