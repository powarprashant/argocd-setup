# Application: monitoring-staging
#
# Same chart as dev but with staging-tuned values.
# Automated sync enabled, but constrained by the staging sync window
# defined in projects/staging-project.yaml (Mon-Fri 08:00-18:00 UTC).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-staging
  namespace: argocd
  labels:
    app.kubernetes.io/name: monitoring-staging
    app.kubernetes.io/part-of: monitoring
    environment: staging
  annotations:
    notifications.argoproj.io/subscribe.on-sync-failed.slack: platform-alerts
    notifications.argoproj.io/subscribe.on-deployed.slack: platform-releases
    notifications.argoproj.io/subscribe.on-health-degraded.slack: platform-alerts
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: staging

  source:
    repoURL: https://github.com/<YOUR_ORG>/monitoring-stack
    targetRevision: main
    path: charts/kube-prometheus-stack/overlays/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring-staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
