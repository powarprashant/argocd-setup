# Application: loki-staging
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-staging
  namespace: argocd
  labels:
    app.kubernetes.io/name: loki-staging
    app.kubernetes.io/part-of: logging
    environment: staging
  annotations:
    notifications.argoproj.io/subscribe.on-sync-failed.slack: platform-alerts
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: staging

  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki-stack
    targetRevision: "2.10.2"
    helm:
      releaseName: loki
      values: |
        loki:
          persistence:
            enabled: true
            size: 50Gi
            storageClassName: gp3
          config:
            auth_enabled: false
            limits_config:
              retention_period: 336h   # 14 days in staging
        promtail:
          enabled: true
        grafana:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: logging-staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
